name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v0.1.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config gettext-base llvm \
            libssl-dev libfontconfig-dev libxkbcommon-dev \
            libwayland-dev libvulkan-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Bundle
        run: ./scripts/bundle-linux.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          arch="$(uname -m)"
          tarball="target/release/kosmos-linux-${arch}.tar.gz"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$tarball" scripts/install.sh scripts/uninstall.sh --clobber
          else
            gh release create "$tag" \
              --title "Kosmos $tag" \
              --draft \
              --generate-notes \
              "$tarball" scripts/install.sh scripts/uninstall.sh
          fi
